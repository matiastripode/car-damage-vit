services:
  traefik:
    image: traefik:v3.2
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./certs:/etc/traefik/certs:ro
    networks:
      - edge

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:6000
      - MLFLOW_MODEL_NAME=car-damage-mobilevit
      - MLFLOW_MODEL_ALIAS=production
      - BASE_MODEL_NAME=apple/mobilevit-small
      - NUM_CLASSES=7
      # Persistencia de ROI + respuesta de inferencia en MinIO (bucket RLHF).
      - MINIO_RLHF_ENABLED=true
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_RLHF_BUCKET=rlhf
    depends_on:
      - mlflow
      - minio
    networks:
      - edge

  web:
    build:
      context: .
      dockerfile: clients/web/Dockerfile
    environment:
      - API_BASE_URL=http://api:8000
      - STREAMLIT_SERVER_BASE_URL_PATH=/ui
    depends_on:
      - api
    networks:
      - edge

  mlflow:
    image: python:3.10-slim
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir mlflow==3.10.1 'datasets>=2.14.0' 'Pillow>=10.0.0' &&
      mlflow server
      --host 0.0.0.0
      --port 6000
      --allowed-hosts *
      --static-prefix /mlflow
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --serve-artifacts
      --artifacts-destination /mlruns"
    volumes:
      - ./data:/data
      - mlruns_data:/mlruns
    ports:
      - "6000:6000"
    networks:
      - edge

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BROWSER_REDIRECT_URL=http://localhost:9001
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - edge

networks:
  edge:
    driver: bridge

volumes:
  mlruns_data:
  minio_data:
